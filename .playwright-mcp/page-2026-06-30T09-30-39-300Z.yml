          - generic [ref=f1e60]: 1M AGO
        - paragraph [ref=f1e61]: "The most valuable signal in commerce is pre-purchase intent — and nobody captures it. Merchants launch drops blind. Shoppers miss items they wanted before they existed. Working on BagUp: a demand layer where shoppers earmark items before inventory exists, merchants read that signal and execute drops, and partners handle local fulfillment. Intent before inventory."
        - generic [ref=f1e64]: Benji Lopez
