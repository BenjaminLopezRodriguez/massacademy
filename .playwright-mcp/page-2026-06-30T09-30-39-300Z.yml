          - generic [ref=f1e50]: Observation
          - generic [ref=f1e51]: 0M AGO
        - paragraph [ref=f1e52]: "Africa has the largest physical-world data gap for AI training. Ground-truth data — what's actually on the ground, verified by human observers — is what makes AI models reliable in the real world. Pivoted Afreka from fractional real estate to an active observation network: people generating verified physical-world data on demand. AI infrastructure, not a consumer app."
        - generic [ref=f1e55]: Benji Lopez
      - listitem [ref=f1e56]:
        - generic [ref=f1e57]:
