        - paragraph [ref=f1e79]: "Shipped Zend across five surfaces in one sprint: iOS Share Extension, Chrome extension, Slack bot, WhatsApp bot, and web. The same \"send a file\" action now lives natively wherever someone is already working. No one should have to open a new app to share something."
