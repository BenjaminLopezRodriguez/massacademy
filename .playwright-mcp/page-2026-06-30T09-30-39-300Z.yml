          - generic [ref=f1e33]: 0M AGO
        - paragraph [ref=f1e34]: "When you go on medical leave, your only job should be to get better. Instead people spend it fighting insurance, filling out forms, tracking deadlines, and managing HR. Nobody has a Sylvia — a person who handles all of that for you. Building Candle: the scope is work harms you → health fails → medical leave → disability/benefits → recovery → return or transition. All of it."
        - generic [ref=f1e37]: Benji Lopez
      - listitem [ref=f1e38]:
        - generic [ref=f1e39]:
          - generic [ref=f1e41]: Prototype
          - generic [ref=f1e42]: 0M AGO
        - paragraph [ref=f1e43]: "Siro: dark-first social with five post types — photo, video, voice, check-in, thought. Card redesign shipped with safe-zone layout and post-type badges. Likes system live on iOS and web. The thesis is authenticity over curation — BeReal-adjacent but without the forced simultaneity. Camera-first on iOS, browsing on web."
        - generic [ref=f1e46]: Benji Lopez
      - listitem [ref=f1e47]:
