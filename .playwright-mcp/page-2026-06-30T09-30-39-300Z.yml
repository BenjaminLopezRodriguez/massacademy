        - paragraph [ref=f1e70]: Juce rooms are live. iOS users can squeeze moments from live audio conversations and post clips to a feed. Room creation is instant — tap the FAB, you're in. Wired to real API, real data, no dummies. The core mechanic is working.
        - generic [ref=f1e73]: Benji Lopez
