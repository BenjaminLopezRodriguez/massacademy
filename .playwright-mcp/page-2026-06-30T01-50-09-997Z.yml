              - paragraph [ref=e139]: Every shift handover in the ICU involves 20 minutes of nurses transcribing vitals that are already in the EHR. The data exists — nobody has solved the handover workflow. We're doing manual ETL between systems at 6am every morning.
              - generic [ref=e140]:
                - generic [ref=e141]: Maria Santos
                - generic [ref=e142]: ·
                - generic [ref=e143]: Jun 1
            - listitem [ref=e144]:
              - paragraph [ref=e145]: Handover in our NICU can take 45 minutes if a patient had a procedure. Nothing is automated. We type everything twice into a paper sheet that gets scanned and lost.
              - generic [ref=e146]:
                - generic [ref=e147]: Alicia Torres
                - generic [ref=e148]: ·
                - generic [ref=e149]: Jun 7
            - listitem [ref=e150]:
              - paragraph [ref=e151]: The paper trail between day and night shift is where most medication errors originate. Night nurses can't verify what morning did without calling someone. EHRs don't help because nobody keeps them updated during handover.
              - generic [ref=e152]:
                - generic [ref=e153]: Dr. Ren Watanabe
                - generic [ref=e154]: ·
                - generic [ref=e155]: Jun 12
